<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Resume</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-indigo-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6 space-y-4">

    <h2 class="text-2xl font-bold text-center text-indigo-600">
        Upload Your Resume
    </h2>

    <p class="text-sm text-center text-gray-500">
        Supported formats: <b>.TXT</b>, <b>.DOCX</b> (Max 2MB)
    </p>

    <!-- Drag & Drop Area -->
    <div id="dropZone"
         class="border-2 border-dashed border-indigo-400 rounded-xl p-6 text-center cursor-pointer hover:bg-indigo-50 transition">
        <p class="text-gray-600">Drag & Drop your resume here</p>
        <p class="text-sm text-gray-400 mt-1">or click to browse</p>
        <input type="file" id="resumeFile" accept=".txt,.docx" class="hidden">
    </div>

    <!-- Progress Bar -->
    <div class="hidden" id="progressBox">
        <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
            <div id="progressBar" class="bg-indigo-600 h-2 rounded-full w-0"></div>
        </div>
    </div>

    <!-- Preview -->
    <div id="previewBox" class="hidden bg-gray-50 border rounded-lg p-3 text-sm h-32 overflow-y-auto">
        <p class="font-semibold mb-1">Resume Preview:</p>
        <pre id="previewText" class="text-gray-600 whitespace-pre-wrap"></pre>
    </div>

    <button onclick="saveResume()"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
        Upload & Analyze
    </button>

    <!-- Upload Count -->
    <p id="resumeCount" class="text-center text-xs text-gray-500"></p>

</div>

<script>
const fileInput = document.getElementById("resumeFile");
const dropZone = document.getElementById("dropZone");
const previewBox = document.getElementById("previewBox");
const previewText = document.getElementById("previewText");
const progressBox = document.getElementById("progressBox");
const progressBar = document.getElementById("progressBar");

dropZone.onclick = () => fileInput.click();

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("bg-indigo-100");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("bg-indigo-100");
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("bg-indigo-100");
    fileInput.files = e.dataTransfer.files;
    previewFile();
});

fileInput.addEventListener("change", previewFile);

async function previewFile() {
    const file = fileInput.files[0];
    if (!file) return;

    if (file.size > 2 * 1024 * 1024) {
        alert("File size must be under 2MB");
        fileInput.value = "";
        return;
    }

    let text = "";

    if (file.name.endsWith(".txt")) {
        text = await file.text();
    } else {
        const buffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buffer });
        text = result.value;
    }

    previewText.textContent = text.slice(0, 600) + "...";
    previewBox.classList.remove("hidden");
}

async function saveResume() {
    const file = fileInput.files[0];
    if (!file) return alert("Please select a resume");

    progressBox.classList.remove("hidden");
    progressBar.style.width = "0%";

    let progress = 0;
    const interval = setInterval(() => {
        progress += 10;
        progressBar.style.width = progress + "%";
        if (progress >= 100) clearInterval(interval);
    }, 80);

    let extractedText = "";

    if (file.name.endsWith(".txt")) {
        extractedText = await file.text();
    } else {
        const buffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buffer });
        extractedText = result.value;
    }

    const key = "advancedResumes_v2";
    const user = JSON.parse(localStorage.getItem("userProfile"));
    let resumes = JSON.parse(localStorage.getItem(key) || "[]");

    resumes.unshift({
        id: crypto.randomUUID(),
        name: file.name,
        content: extractedText.trim(),
        uploaded: new Date().toLocaleString("en-IN"),
        status: "uploaded",
        email: user?.email || "unknown"
    });

    localStorage.setItem(key, JSON.stringify(resumes));

    setTimeout(() => {
        alert("Resume Uploaded Successfully ✔");
        window.location.href = "login.html";
    }, 700);
}

function updateCount() {
    const resumes = JSON.parse(localStorage.getItem("advancedResumes_v2") || "[]");
    resumeCount.textContent = `Total resumes uploaded: ${resumes.length}`;
}

updateCount();
</script>

</body>
</html>
