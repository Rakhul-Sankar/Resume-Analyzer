<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon"  href="logo.avif">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analysis</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6 flex justify-center">

<div class="w-full max-w-4xl space-y-6">

  <h1 class="text-3xl font-bold text-center text-indigo-600">
    Resume Analysis Result
  </h1>

  <!-- ATS SCORE -->
  <div class="bg-white p-6 rounded-xl shadow text-center">
    <h2 class="text-xl font-semibold">ATS Score</h2>
    <p id="atsScore" class="text-5xl font-black text-indigo-600 mt-4">--%</p>
    <p id="atsLabel" class="mt-2 text-gray-600 font-medium"></p>
  </div>

  <!-- SKILLS -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-semibold">
      Skills Found (<span id="skillCount">0</span>)
    </h2>
    <ul id="skillsList" class="list-disc pl-5 mt-4 text-gray-700"></ul>
  </div>

  <div class="text-center">
    <a href="reports.html"
       class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700">
      View Reports
    </a>
  </div>

</div>

<script>
/* ===== AUTH CHECK ===== */
const user = JSON.parse(localStorage.getItem("loggedUser"));
if (!user) {
  alert("Session expired. Please login again.");
  window.location.href = "login.html";
}

/* ===== LOAD UPLOADED RESUMES ===== */
let resumes = JSON.parse(localStorage.getItem("advancedResumes_v2")) || [];

/* ===== GET LATEST USER RESUME ===== */
const index = resumes.findIndex(r => r.email === user.email);
if (index === -1) {
  alert("No resume found. Upload again.");
  window.location.href = "upload.html";
}

const resume = resumes[index];
const text = (resume.content || "").toLowerCase();

/* ===== ATS SCORE LOGIC ===== */
let score = 45;
const keywords = [
  "skills","experience","education","project",
  "html","css","javascript","python",
  "java","django","react","sql","internship"
];

keywords.forEach(k => {
  if (text.includes(k)) score += 3;
});

if (text.length > 1000) score += 10;
if (text.length > 2000) score += 10;
score = Math.min(score, 100);

/* ===== DISPLAY SCORE ===== */
document.getElementById("atsScore").innerText = score + "%";
document.getElementById("atsLabel").innerText =
  score >= 80 ? "Excellent ATS Match" :
  score >= 65 ? "Good ATS Match" :
  "Needs Improvement";

/* ===== SKILL EXTRACTION ===== */
const skillDB = [
  "python","java","django","html","css","javascript",
  "react","node","sql","mongodb","git","tailwind"
];

const matched = skillDB.filter(s => text.includes(s));
document.getElementById("skillCount").innerText = matched.length;

const list = document.getElementById("skillsList");
list.innerHTML = matched.length
  ? matched.map(s => `<li>${s.toUpperCase()}</li>`).join("")
  : "<li>No skills detected</li>";

/* ===== SAVE RESULT BACK TO SAME RESUME ===== */
resumes[index] = {
  ...resume,
  score: score,
  analyzed: true,
  analyzedDate: new Date().toLocaleString()
};

localStorage.setItem("advancedResumes_v2", JSON.stringify(resumes));

console.log("✅ ATS saved into uploaded resume");
</script>

</body>
</html>
