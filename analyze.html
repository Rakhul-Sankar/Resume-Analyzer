<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="logo.avif">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyze</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex flex-col">

<!-- NAVIGATION -->
<nav class="bg-white shadow-lg border-b sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

    <h1 class="text-2xl font-bold text-indigo-600">Resume Analyzer</h1>

    <!-- Desktop Menu -->
    <div class="hidden md:flex space-x-4 items-center">
      <a href="upload.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Upload</a>
      <a href="dashboard.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Dashboard</a>
      <a href="reports.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Past Reports</a>
      <a href="profile.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Profile</a>
      <button onclick="logout()" class="text-red-600 font-medium px-3 py-2">Logout</button>
    </div>

    <!-- Mobile Hamburger -->
    <button
      onclick="toggleMenu()"
      class="md:hidden text-gray-700 text-2xl focus:outline-none">
      ☰
    </button>
  </div>

  <!-- Mobile Menu -->
<div id="mobileMenu" class="hidden md:hidden bg-white border-t">
  <a href="upload.html" class="block text-gray-700 hover:text-purple-600 font-medium px-6 py-3" onclick="toggleMenu()">Upload</a>
  <a href="dashboard.html" class="block text-gray-700 hover:text-purple-600 font-medium px-6 py-3" onclick="toggleMenu()">Dashboard</a>
  <a href="reports.html" class="block text-gray-700 hover:text-purple-600 font-medium px-6 py-3" onclick="toggleMenu()">Past Reports</a>
  <a href="profile.html" class="block text-gray-700 hover:text-purple-600 font-medium px-6 py-3" onclick="toggleMenu()">Profile</a>
  <button onclick="logout()" class="w-full text-left text-red-600 px-6 py-3">
    Logout
  </button>
</div>

</nav>


<!-- MAIN CONTENT -->
<main class="flex justify-center p-6">
<div class="w-full max-w-4xl space-y-6">

  <h1 class="text-3xl font-bold text-center text-indigo-600">
    Resume Analysis Result
  </h1>

  <!-- ATS SCORE -->
  <div class="bg-white p-6 rounded-xl shadow text-center">
    <h2 class="text-xl font-semibold">ATS Score</h2>
    <p id="atsScore" class="text-5xl font-black text-indigo-600 mt-4">--%</p>
    <p id="atsLabel" class="mt-2 text-gray-600 font-medium"></p>
  </div>

  <!-- SKILLS -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-semibold">
      Skills Found (<span id="skillCount">0</span>)
    </h2>
    <ul id="skillsList" class="list-disc pl-5 mt-4 text-gray-700"></ul>
  </div>

  <!-- SUGGESTIONS -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-semibold text-red-600">
      Improvement Suggestions
    </h2>
    <ul id="suggestionsList" class="list-disc pl-5 mt-4 text-gray-700"></ul>
  </div>

  <div class="text-center">
    <a href="reports.html"
       class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700">
      View Reports
    </a>
  </div>

</div>
</main>

<script>

  /* ===== MOBILE NAV TOGGLE ===== */
function toggleMenu() {
  const menu = document.getElementById("mobileMenu");
  menu.classList.toggle("hidden");
}

/* ================= AUTH CHECK ================= */
const user = JSON.parse(localStorage.getItem("loggedUser"));
if (!user) {
  alert("Session expired. Please login again.");
  window.location.href = "login.html";
}

/* ================= LOAD RESUMES ================= */
let resumes = JSON.parse(localStorage.getItem("advancedResumes_v2")) || [];

const index = resumes.findIndex(r => r.email === user.email);
if (index === -1) {
  alert("No resume found. Upload again.");
  window.location.href = "upload.html";
}

const resume = resumes[index];
const text = (resume.content || "").toLowerCase();

/* ================= ATS SCORING ================= */
let score = 0;

/* SECTION BASED SCORING */
const sections = [
  { keywords: ["@", "email", "phone"], weight: 15 },
  { keywords: ["education", "college", "university"], weight: 15 },
  { keywords: ["experience", "internship", "work"], weight: 20 },
  { keywords: ["skills", "technologies", "tools"], weight: 20 },
  { keywords: ["project", "projects"], weight: 10 }
];

sections.forEach(sec => {
  if (sec.keywords.some(k => text.includes(k))) {
    score += sec.weight;
  }
});

/* ================= SKILL EXTRACTION ================= */

// Master skill dictionary (write ONCE, reusable)
const MASTER_SKILLS = [
  "python","java","c","c++","c#",
  "html","css","javascript","typescript",
  "react","angular","vue",
  "node","express",
  "django","flask",
  "sql","mysql","postgresql","mongodb",
  "git","github","docker","aws",
  "tailwindcss","bootstrap"
];

// Function to extract skills from resume text
function extractSkills(resumeText) {
  const found = MASTER_SKILLS.filter(skill =>
    new RegExp(`\\b${skill}\\b`, "i").test(resumeText)
  );
  return [...new Set(found)];
}

const matchedSkills = extractSkills(text);

/* Skill-based ATS scoring */
score += Math.min(matchedSkills.length * 2, 20);


/* ================= DISPLAY SCORE ================= */
document.getElementById("atsScore").innerText = score + "%";

document.getElementById("atsLabel").innerText =
  score >= 85 ? "Excellent ATS Match" :
  score >= 70 ? "Good ATS Match" :
  score >= 50 ? "Average – Needs Improvement" :
  "Poor ATS Match";

/* ================= SKILL DISPLAY ================= */
document.getElementById("skillCount").innerText = matchedSkills.length;

const skillsList = document.getElementById("skillsList");
skillsList.innerHTML = matchedSkills.length
  ? matchedSkills.map(s => `<li>${s.toUpperCase()}</li>`).join("")
  : "<li>No skills detected</li>";

/* ================= SUGGESTIONS ================= */
const suggestions = [];

// Contact
if (!text.includes("@") && !text.includes("phone")) {
  suggestions.push("Add clear contact details (email and phone number) at the top.");
}

// Education
if (!text.includes("education")) {
  suggestions.push("Include an Education section with degree, college, and year.");
}

// Experience
if (!text.includes("experience") && !text.includes("internship")) {
  suggestions.push("Add Work Experience or Internship details to improve ATS score.");
}

// Skills section
if (!text.includes("skills")) {
  suggestions.push("Add a dedicated Skills section listing your technical abilities.");
}

// Projects
if (!text.includes("project")) {
  suggestions.push("Mention academic or personal projects with brief descriptions.");
}

// Resume length
if (text.length < 600) {
  suggestions.push("Resume content is too short. Add more details to strengthen it.");
}

// Skill strength
if (matchedSkills.length < 5) {
  suggestions.push("Include more relevant technical skills for better ATS matching.");
}

/* DISPLAY SUGGESTIONS */
const suggestionList = document.getElementById("suggestionsList");
suggestionList.innerHTML = suggestions.length
  ? suggestions.map(s => `<li>${s}</li>`).join("")
  : "<li class='text-green-600 font-medium'>Great job! Your resume is ATS friendly.</li>";

/* ================= SAVE RESULT ================= */
resumes[index] = {
  ...resume,
  score: score,
  analyzed: true,
  analyzedDate: new Date().toLocaleString()
};

localStorage.setItem("advancedResumes_v2", JSON.stringify(resumes));
</script>

</body>
</html>
