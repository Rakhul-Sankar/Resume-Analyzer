<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="logo.avif">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen p-6 flex items-center justify-center">

<div id="login-box" class="w-full max-w-sm bg-white p-6 rounded-xl shadow-lg hidden">
  <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">
    Login
  </h2>

  <form onsubmit="loginUser(event)" class="space-y-4">

    <!-- Email -->
    <input id="email" type="email" placeholder="Email"
      class="w-full p-3 border rounded-lg" required>

    <!-- Password with eye toggle (copy disabled) -->
    <div class="relative">
      <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full p-3 border rounded-lg pr-10"
        required
        oncopy="return false"
        oncut="return false"
        onpaste="return false"
        oncontextmenu="return false"
      >

      <button
        type="button"
        id="eyeBtn"
        onclick="togglePassword()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-lg select-none">
        👁️
      </button>
    </div>

    <p id="errorMsg" class="text-red-600 text-sm hidden"></p>

    <button type="submit"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
      Login
    </button>
  </form>

  <p class="mt-4 text-center text-sm">
    No account?
    <a href="signup.html" class="text-blue-600 font-medium">Create one</a>
  </p>
</div>

<script>
/* ===== SHOW LOGIN BOX ON LOAD ===== */
window.onload = () => {
  document.getElementById("login-box").classList.remove("hidden");

  // Block Ctrl+C / Ctrl+V / Ctrl+X for password
  const pwd = document.getElementById("password");
  pwd.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && ["c", "v", "x"].includes(e.key.toLowerCase())) {
      e.preventDefault();
    }
  });
};

/* ===== TOGGLE PASSWORD + SLASHED EYE ===== */
function togglePassword() {
  const pass = document.getElementById("password");
  const eye = document.getElementById("eyeBtn");

  if (pass.type === "password") {
    pass.type = "text";
    eye.innerText = "👁️‍🗨️"; // visible
  } else {
    pass.type = "password";
    eye.innerText = "👁️"; // hidden
  }
}
</script>

</body>
</html>
