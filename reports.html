<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Reports</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-emerald-50 to-green-100 min-h-screen">

<!-- ===== AUTH CHECK ===== -->
<script>
const currentUser = JSON.parse(localStorage.getItem("loggedUser"));
if (!currentUser) window.location.href = "login.html";
</script>

<!-- ===== NAV ===== -->
<nav class="bg-white shadow-lg border-b sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
    <h1 class="text-2xl font-bold text-indigo-600">Resume Analyzer</h1>
    <div class="space-x-4">
      <a href="dashboard.html" class="font-medium text-gray-700">Dashboard</a>
      <a href="profile.html" class="font-medium text-gray-700">Profile</a>
    </div>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<main class="max-w-6xl mx-auto px-6 py-10">

<h1 class="text-4xl font-black text-center mb-10 text-green-700">
📊 Resume Analysis Reports
</h1>

<!-- ===== STATS ===== -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
  <div class="bg-white p-6 rounded-xl shadow text-center">
    <p class="text-gray-500">Total Reports</p>
    <h2 id="totalCount" class="text-3xl font-bold text-indigo-600">0</h2>
  </div>

  <div class="bg-white p-6 rounded-xl shadow text-center">
    <p class="text-gray-500">Best ATS Score</p>
    <h2 id="bestScore" class="text-3xl font-bold text-green-600">0%</h2>
  </div>

  <div class="bg-white p-6 rounded-xl shadow text-center">
    <p class="text-gray-500">Average ATS</p>
    <h2 id="avgScore" class="text-3xl font-bold text-blue-600">0%</h2>
  </div>
</section>

<!-- ===== GRID ===== -->
<div id="resumeGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</main>

<!-- ===== MODAL ===== -->
<div id="viewModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
  <div class="bg-white p-6 rounded-xl max-w-md w-full">
    <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
    <p id="modalInfo" class="text-gray-600 whitespace-pre-line"></p>
    <button onclick="closeModal()"
      class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded-lg w-full">
      Close
    </button>
  </div>
</div>

<script>
window.storage = {
  key: "resumeReports",
  reports: [],

  load() {
    const saved = JSON.parse(localStorage.getItem(this.key)) || [];

    this.reports = saved
      .filter(r => r.email === currentUser.email)
      .map(r => ({
        id: r.id,
        name: r.name || "Untitled Resume",
        content: r.content || "",
        score: Number(r.score) || 0,
        date: r.date || new Date().toLocaleString()
      }));

    this.updateStats();
    this.render();
  },

  updateStats() {
    const total = this.reports.length;
    let avg = 0, best = 0;

    if (total) {
      const scores = this.reports.map(r => r.score);
      avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
      best = Math.max(...scores);
    }

    totalCount.innerText = total;
    avgScore.innerText = avg + "%";
    bestScore.innerText = best + "%";
  },

  getBadge(score) {
    if (score >= 80) return "🟢 Excellent Resume";
    if (score >= 60) return "🟡 Good Resume";
    return "🔴 Needs Improvement";
  },

  skillMatch(score) {
    if (score >= 80) return "High Skill Match";
    if (score >= 60) return "Medium Skill Match";
    return "Low Skill Match";
  },

  render() {
    const box = document.getElementById("resumeGrid");

    if (!this.reports.length) {
      box.innerHTML = `
        <div class="col-span-full text-center bg-white p-10 rounded-xl shadow">
          <p class="text-xl font-semibold text-gray-600">
            No resume reports found
          </p>
          <p class="text-gray-400 mt-2">
            Upload and analyze a resume to see reports here.
          </p>
        </div>`;
      return;
    }

    box.innerHTML = this.reports.map(r => `
      <div class="bg-white p-6 rounded-xl shadow space-y-3">
        <h2 class="font-bold truncate">${r.name}</h2>
        <p class="text-xs text-gray-500">📅 ${r.date}</p>

        <div class="text-center text-3xl font-black text-indigo-600">
          ${r.score}%
        </div>

        <p class="text-center text-sm font-semibold">
          ${this.getBadge(r.score)}
        </p>

        <p class="text-center text-xs text-gray-500">
          ${this.skillMatch(r.score)}
        </p>

        <div class="grid grid-cols-3 gap-2 mt-4">
          <button onclick="storage.view('${r.id}')"
            class="bg-gray-700 text-white py-2 rounded text-sm">
            👁 View
          </button>

          <button onclick="storage.reAnalyze('${r.id}')"
            class="bg-blue-600 text-white py-2 rounded text-sm">
            🔁 Re-Analyze
          </button>

          <button onclick="storage.delete('${r.id}')"
            class="bg-red-600 text-white py-2 rounded text-sm">
            🗑 Delete
          </button>
        </div>
      </div>
    `).join("");
  },

  view(id) {
    const r = this.reports.find(x => x.id === id);
    modalTitle.innerText = r.name;
    modalInfo.innerText =
      `ATS Score: ${r.score}%\n\nResume Strength:\n${this.getBadge(r.score)}\n\nSkill Match:\n${this.skillMatch(r.score)}`;
    viewModal.classList.remove("hidden");
  },

  reAnalyze(id) {
    const all = JSON.parse(localStorage.getItem(this.key)) || [];
    const index = all.findIndex(r => r.id === id);
    if (index === -1) return;

    const resume = all[index];
    if (!resume.content) {
      alert("Resume content missing. Cannot re-analyze.");
      return;
    }

    modalTitle.innerText = "Re-Analyzing Resume...";
    modalInfo.innerText = "Calculating ATS score. Please wait...";
    viewModal.classList.remove("hidden");

    setTimeout(() => {
      resume.score = this.calculateATS(resume.content);
      resume.date = new Date().toLocaleString();
      all[index] = resume;

      localStorage.setItem(this.key, JSON.stringify(all));
      viewModal.classList.add("hidden");
      this.load();
    }, 1200);
  },

  calculateATS(text) {
    const keywords = [
      "skills","experience","education","project",
      "html","css","javascript","python",
      "django","react","sql","internship"
    ];

    let score = 40;
    const lower = text.toLowerCase();

    keywords.forEach(k => {
      if (lower.includes(k)) score += 4;
    });

    if (text.length > 1500) score += 10;
    if (text.length > 2500) score += 10;

    return Math.min(score, 100);
  },

  delete(id) {
    if (!confirm("Delete this report?")) return;
    const all = JSON.parse(localStorage.getItem(this.key)) || [];
    localStorage.setItem(
      this.key,
      JSON.stringify(all.filter(r => r.id !== id))
    );
    this.load();
  }
};

function closeModal() {
  viewModal.classList.add("hidden");
}

storage.load();
</script>

</body>
</html>
