<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="logo.avif">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">

<script>
const currentUser = JSON.parse(localStorage.getItem("loggedUser"));
if (!currentUser) window.location.href = "login.html";
</script>

<!-- ================= NAVIGATION ================= -->
<nav class="bg-white shadow-lg border-b">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-indigo-600">Resume Analyzer</h1>

    <div class="flex space-x-4 items-center">
      <a href="upload.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Upload</a>
      <a href="profile.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Profile</a>
      <a href="dashboard.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Dashboard</a>
      <button onclick="logout()" class="text-red-600 font-medium px-3 py-2">Logout</button>
    </div>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-6 py-10">

<h1 class="text-4xl font-black text-center mb-10 text-green-700">
📊 Analyzed Resume Reports
</h1>

<!-- ================= STATS ================= -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
  <div class="bg-white p-6 rounded-xl shadow text-center">
    <p>Total Analyzed</p>
    <h2 id="totalCount" class="text-3xl font-bold text-indigo-600">0</h2>
  </div>

  <div class="bg-white p-6 rounded-xl shadow text-center">
    <p>Best ATS</p>
    <h2 id="bestScore" class="text-3xl font-bold text-green-600">0%</h2>
  </div>

  <div class="bg-white p-6 rounded-xl shadow text-center">
    <p>Average ATS</p>
    <h2 id="avgScore" class="text-3xl font-bold text-blue-600">0%</h2>
  </div>
</section>

<!-- ================= CONTROLS ================= -->
<section class="flex flex-wrap gap-4 mb-8">
  <select id="sortSelect"
          onchange="storage.applyFilters()"
          class="p-2 rounded border">
    <option value="date">Sort by Date</option>
    <option value="scoreDesc">Sort by Score (High → Low)</option>
    <option value="scoreAsc">Sort by Score (Low → High)</option>
  </select>

  <select id="filterSelect"
          onchange="storage.applyFilters()"
          class="p-2 rounded border">
    <option value="all">All</option>
    <option value="excellent">Excellent (80+)</option>
    <option value="good">Good (60–79)</option>
    <option value="poor">Needs Improvement (&lt;60)</option>
  </select>
</section>

<div id="resumeGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</main>

<script>
const storage = {
  key: "advancedResumes_v2",
  reports: [],
  filtered: [],

  load() {
    const all = JSON.parse(localStorage.getItem(this.key)) || [];
    this.reports = all.filter(r =>
      r.email === currentUser.email &&
      r.analyzed === true &&
      typeof r.score === "number"
    );
    this.updateStats();
    this.applyFilters();
  },

  updateStats() {
    const scores = this.reports.map(r => r.score);
    totalCount.innerText = scores.length;
    avgScore.innerText = scores.length
      ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) + "%"
      : "0%";
    bestScore.innerText = scores.length
      ? Math.max(...scores) + "%"
      : "0%";
  },

  applyFilters() {
    let list = [...this.reports];

    const filter = filterSelect.value;
    if (filter === "excellent") list = list.filter(r => r.score >= 80);
    if (filter === "good") list = list.filter(r => r.score >= 60 && r.score < 80);
    if (filter === "poor") list = list.filter(r => r.score < 60);

    const sort = sortSelect.value;
    if (sort === "scoreDesc") list.sort((a,b)=>b.score-a.score);
    if (sort === "scoreAsc") list.sort((a,b)=>a.score-b.score);
    if (sort === "date") list.sort((a,b)=>new Date(b.analyzedDate)-new Date(a.analyzedDate));

    this.filtered = list;
    this.render();
  },

  render() {
    const box = document.getElementById("resumeGrid");

    if (!this.filtered.length) {
      box.innerHTML = `
        <div class="col-span-full bg-white p-8 rounded-xl shadow text-center">
          No reports found
        </div>`;
      return;
    }

    box.innerHTML = this.filtered.map(r => `
      <div class="bg-white p-6 rounded-xl shadow space-y-4">
        <h2 class="font-bold truncate">${r.name}</h2>
        <p class="text-xs text-gray-500">📅 ${r.analyzedDate}</p>

        <div class="text-center text-3xl font-black text-indigo-600">
          ${r.score}%
        </div>

        <p class="text-center font-semibold
          ${r.score>=80?'text-green-600':r.score>=60?'text-yellow-600':'text-red-600'}">
          ${r.score>=80?'Excellent':r.score>=60?'Good':'Needs Improvement'}
        </p>

        <button onclick="storage.confirmDelete('${r.id}')"
          class="w-full bg-red-600 text-white py-2 rounded">
          🗑 Delete
        </button>
      </div>
    `).join("");
  },

  confirmDelete(id) {
    if (confirm("Are you sure you want to delete this report?")) {
      this.delete(id);
    }
  },

  delete(id) {
    let all = JSON.parse(localStorage.getItem(this.key)) || [];
    all = all.filter(r => r.id !== id);
    localStorage.setItem(this.key, JSON.stringify(all));
    this.load();
  }
};

storage.load();

function logout() {
  localStorage.removeItem("loggedUser");
  window.location.href = "login.html";
}
</script>

</body>
</html>
