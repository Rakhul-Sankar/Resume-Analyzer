{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-sm bg-white p-6 rounded-xl shadow-lg">

  <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">
    Reset Password
  </h2>

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <input
      type="email"
      name="email"
      placeholder="Registered Email"
      class="w-full p-3 border rounded-lg"
      required
    >

    <input
      type="password"
      name="old_password"
      placeholder="Old Password"
      class="w-full p-3 border rounded-lg"
      required
    >

    <input
      type="password"
      name="new_password"
      placeholder="New Password"
      class="w-full p-3 border rounded-lg"
      required
    >

    <input
      type="password"
      name="confirm_password"
      placeholder="Confirm New Password"
      class="w-full p-3 border rounded-lg"
      required
    >

    {% if messages %}
      {% for message in messages %}
        <p class="text-red-600 text-sm text-center">{{ message }}</p>
      {% endfor %}
    {% endif %}

    <button
      type="submit"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
      Update Password
    </button>
  </form>

  <p class="mt-4 text-center text-sm">
    Remembered password?
    <a href="{% url 'login' %}" class="text-blue-600 font-medium">Login</a>
  </p>

</div>

</body>
</html>
