<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="logo.avif">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen p-6 flex items-center justify-center">

<div class="w-full max-w-sm bg-white p-6 rounded-xl shadow-lg">

  <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">
    Create Account
  </h2>

  <form onsubmit="signupUser(event)" class="space-y-4">

    <input id="name" type="text" placeholder="Full Name"
      class="w-full p-3 border rounded-lg" required>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-3 border rounded-lg" required>

    <input id="password" type="password" placeholder="Password"
      class="w-full p-3 border rounded-lg" required>

    <p id="errorMsg" class="text-red-600 text-sm hidden"></p>

    <button type="submit"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
      Create Account
    </button>
  </form>

  <p class="mt-4 text-center text-sm">
    Already have an account?
    <a href="login.html" class="text-blue-600 font-medium">Login</a>
  </p>

</div>

<script>
async function signupUser(event) {
  event.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorMsg = document.getElementById("errorMsg");

  errorMsg.classList.add("hidden");

  if (password.length < 6) {
    errorMsg.innerText = "Password must be at least 6 characters";
    errorMsg.classList.remove("hidden");
    return;
  }

  try {
    const response = await fetch("http://127.0.0.1:8000/api/signup/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const data = await response.json();

    if (!data.success) {
      errorMsg.innerText = data.message || "Signup failed";
      errorMsg.classList.remove("hidden");
      return;
    }

    // Save only safe user info
    localStorage.setItem("loggedUser", JSON.stringify(data.user));

    // Redirect after signup
    window.location.href = "dashboard.html";

  } catch (err) {
    errorMsg.innerText = "Backend not reachable. Start Django server.";
    errorMsg.classList.remove("hidden");
  }
}
</script>

</body>
</html>
