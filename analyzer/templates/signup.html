{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="{% static 'logo.avif' %}">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen p-6 flex items-center justify-center">

<div class="w-full max-w-sm bg-white p-6 rounded-xl shadow-lg">

  <h2 class="text-2xl font-bold text-center mb-6 text-indigo-600">
    Create Account
  </h2>

  {% if messages %}
    {% for msg in messages %}
      <p class="text-red-600 text-sm mb-3">{{ msg }}</p>
    {% endfor %}
  {% endif %}

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <input name="name" type="text" placeholder="Full Name"
      class="w-full p-3 border rounded-lg" required>

    <input name="email" type="email" placeholder="Email"
      class="w-full p-3 border rounded-lg" required>

    <!-- PASSWORD WITH EYE -->
    <div class="relative">
      <input id="password" name="password" type="password"
        placeholder="Password"
        class="w-full p-3 border rounded-lg pr-10" required>

      <button type="button"
        onclick="togglePassword()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">
        👁️
      </button>
    </div>

    <button type="submit"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
      Create Account
    </button>
  </form>

  <p class="mt-4 text-center text-sm">
    Already have an account?
    <a href="{% url 'login' %}" class="text-blue-600 font-medium">Login</a>
  </p>

</div>

<script>
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
