<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>User System</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<!-- ================= LOGIN FORM ================ -->
<div id="loginBox" class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-gray-200 hidden">
  <h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">Login</h2>

  <input id="loginEmail" type="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3" />
  <input id="loginPass" type="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-4" />

  <button id="loginBtn" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-semibold hover:bg-indigo-700">
    Login
  </button>

  <p class="text-center mt-4 text-sm">
    No account? <span id="toSignup" class="text-blue-600 cursor-pointer">Create one</span>
  </p>

  <p id="loginError" class="text-red-500 text-center mt-3 hidden">Invalid login details!</p>
</div>

<!-- ================= SIGNUP FORM ================ -->
<div id="signupBox" class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-gray-200 hidden">
  <h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">Create Account</h2>

  <input id="signupName" type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg mb-3" />
  <input id="signupEmail" type="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3" />
  <input id="signupPass" type="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-4" />

  <button id="createBtn" class="w-full bg-green-600 text-white p-3 rounded-lg font-semibold hover:bg-green-700">
    Create Account
  </button>

  <p class="text-center mt-4 text-sm">
    Already have an account? <span id="toLogin" class="text-blue-600 cursor-pointer">Login</span>
  </p>

  <p id="signupError" class="text-red-500 text-center mt-3 hidden">Email already used!</p>
</div>

<!-- ================= PROFILE PAGE ================= -->
<div id="profilePage"
  class="bg-white w-full max-w-3xl p-8 rounded-2xl shadow-xl border border-gray-200 hidden">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-3xl font-bold text-indigo-600">My Profile</h2>

    <div class="flex gap-4 text-sm">
      <button id="logoutBtn" class="text-red-500 underline">Logout</button>
      <button id="newAccountBtn" class="text-blue-600 underline">New Account</button>
    </div>
  </div>

  <!-- Profile Form -->
  <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
    <div>
      <label class="font-semibold">Full Name</label>
      <input id="nameInput" type="text"
        class="w-full p-3 border rounded-lg mt-1" />
    </div>

    <div>
      <label class="font-semibold">Email</label>
      <input id="emailInput" type="email"
        class="w-full p-3 border rounded-lg mt-1 bg-gray-100"
        disabled />
    </div>

    <div class="md:col-span-2">
      <button type="submit"
        class="w-full bg-indigo-600 text-white p-3 rounded-lg font-semibold hover:bg-indigo-700">
        Save Profile
      </button>
    </div>
  </form>

  <hr class="my-6">

  <!-- Resume History -->
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-2xl font-bold">Resume Analysis History</h3>
    <button onclick="clearAllReports()"
      class="text-sm text-red-600 underline">
      Clear All
    </button>
  </div>

  <div id="resumeList" class="space-y-3 text-sm"></div>
</div>


<script>
const profilePage = document.getElementById("profilePage");
const nameInput = document.getElementById("nameInput");
const emailInput = document.getElementById("emailInput");
const resumeList = document.getElementById("resumeList");
const profileForm = document.getElementById("profileForm");

const logoutBtn = document.getElementById("logoutBtn");
const newAccountBtn = document.getElementById("newAccountBtn");

/* ---------------- LOAD PROFILE ---------------- */
function loadProfile() {
  const user = JSON.parse(localStorage.getItem("loggedUser"));
  if (!user) return;

  nameInput.value = user.name;
  emailInput.value = user.email;

  const reports = JSON.parse(localStorage.getItem("resumeReports")) || [];
  const userReports = reports.filter(r => r.email === user.email);

  if (!userReports.length) {
    resumeList.innerHTML =
      `<p class="text-gray-500">No resumes analyzed yet.</p>`;
    return;
  }

  resumeList.innerHTML = userReports.map((r, index) => `
    <div class="p-4 bg-gray-100 rounded-xl flex justify-between items-center">
      <div>
        <p class="font-bold">${r.filename}</p>
        <p class="text-gray-600 text-xs">${r.date}</p>
      </div>

      <div class="flex items-center gap-4">
        <span class="px-3 py-1 rounded-full text-sm font-bold
          ${r.score >= 70 ? 'bg-green-200 text-green-700'
                          : 'bg-red-200 text-red-700'}">
          ${r.score}%
        </span>

        <button onclick="deleteReport(${index})"
          class="text-red-500 text-xs underline">
          Delete
        </button>
      </div>
    </div>
  `).join("");
}

/* ---------------- SAVE PROFILE ---------------- */
profileForm.addEventListener("submit", e => {
  e.preventDefault();

  let users = JSON.parse(localStorage.getItem("users")) || [];
  let loggedUser = JSON.parse(localStorage.getItem("loggedUser"));

  loggedUser.name = nameInput.value.trim();
  users = users.map(u => u.email === loggedUser.email ? loggedUser : u);

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("loggedUser", JSON.stringify(loggedUser));

  alert("Profile updated successfully!");
});

/* ---------------- DELETE SINGLE REPORT ---------------- */
function deleteReport(index) {
  const user = JSON.parse(localStorage.getItem("loggedUser"));
  let reports = JSON.parse(localStorage.getItem("resumeReports")) || [];

  const userReports = reports.filter(r => r.email === user.email);
  const target = userReports[index];

  reports = reports.filter(r => r !== target);
  localStorage.setItem("resumeReports", JSON.stringify(reports));

  loadProfile();
}

/* ---------------- CLEAR ALL REPORTS ---------------- */
function clearAllReports() {
  const user = JSON.parse(localStorage.getItem("loggedUser"));
  let reports = JSON.parse(localStorage.getItem("resumeReports")) || [];

  reports = reports.filter(r => r.email !== user.email);
  localStorage.setItem("resumeReports", JSON.stringify(reports));

  loadProfile();
}

/* ---------------- LOGOUT ---------------- */
logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("loggedUser");
  location.reload();
});

/* ---------------- NEW ACCOUNT ---------------- */
newAccountBtn.addEventListener("click", () => {
  localStorage.removeItem("loggedUser");
  location.reload();
});

/* ---------------- INIT ---------------- */
loadProfile();
</script>

</body>
</html>
