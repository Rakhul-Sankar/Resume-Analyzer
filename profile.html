<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div id="profilePage"
  class="bg-white w-full max-w-3xl p-8 rounded-2xl shadow-xl border">

  <div class="flex justify-between mb-6">
    <h2 class="text-3xl font-bold text-indigo-600">My Profile</h2>
    <button onclick="logout()" class="text-red-600 underline">Logout</button>
  </div>

  <div class="grid grid-cols-2 gap-4 mb-6">
    <input id="nameInput" class="p-3 border rounded">
    <input id="emailInput" disabled class="p-3 border rounded bg-gray-100">
  </div>

  <div class="flex justify-between items-center mb-4">
    <h3 class="text-xl font-bold">
      Resume Analysis History (<span id="reportCount">0</span>)
    </h3>
    <a href="analyze.html"
       class="text-indigo-600 underline text-sm">
       Analyze New Resume
    </a>
  </div>

  <div id="resumeList" class="space-y-3"></div>
</div>

<script>
function loadProfile() {
  const user = JSON.parse(localStorage.getItem("loggedUser"));
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("nameInput").value = user.name;
  document.getElementById("emailInput").value = user.email;

  const reports = JSON.parse(localStorage.getItem("resumeReports")) || [];
  const userReports = reports.filter(r => r.email === user.email);

  document.getElementById("reportCount").innerText = userReports.length;

  document.getElementById("resumeList").innerHTML =
    userReports.length
      ? userReports.map(r => `
        <div class="p-4 bg-gray-100 rounded flex justify-between">
          <div>
            <b>${r.filename}</b>
            <div class="text-xs text-gray-500">${r.date}</div>
          </div>
          <span class="font-bold">${r.score}%</span>
        </div>
      `).join("")
      : "<p class='text-gray-500'>No resumes analyzed yet.</p>";
}

function logout() {
  localStorage.removeItem("loggedUser");
  window.location.href = "login.html";
}

loadProfile();
</script>

</body>
</html>
