<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="logo.avif">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">

<!-- ================= NAVIGATION ================= -->
<nav class="bg-white shadow-lg border-b sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

    <h1 class="text-2xl font-bold text-indigo-600">Resume Analyzer</h1>

    <div class="hidden md:flex space-x-4 items-center">
      <a href="upload.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Upload</a>
      <a href="reports.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Past Reports</a>
      <a href="dashboard.html" class="text-gray-700 hover:text-purple-600 font-medium px-3 py-2">Dashboard</a>
      <button onclick="logout()" class="text-red-600 font-medium px-3 py-2">Logout</button>   
    </div>

    <button onclick="toggleMenu()" class="md:hidden text-gray-700 text-2xl">☰</button>
  </div>

  <div id="mobileMenu" class="hidden bg-white border-t">
    <a href="upload.html" class="block px-6 py-3" onclick="toggleMenu()">Upload</a>
    <a href="reports.html" class="block px-6 py-3" onclick="toggleMenu()">Past Reports</a>
    <a href="dashboard.html" class="block px-6 py-3" onclick="toggleMenu()">Dashboard</a>
    <button onclick="logout()" class="w-full text-left text-red-600 px-6 py-3">Logout</button>
  </div>
</nav>

<!-- ================= PROFILE ================= -->
<main class="flex justify-center p-6">
<div class="bg-white w-full max-w-4xl p-8 rounded-2xl shadow-xl border">

  <h2 class="text-3xl font-bold text-indigo-600 mb-6">Profile</h2>

  <!-- NAME -->
  <div class="mb-6">
    <input id="nameInput" placeholder="Your Name"
      class="p-3 border rounded w-full md:w-1/2">
  </div>

  <button id="saveBtn"
    class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 mb-8">
    Save Profile
  </button>

  <!-- STATS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-gray-100 p-4 rounded text-center">
      <p class="text-gray-500 text-sm">Total Reports</p>
      <h3 id="totalResumes" class="text-2xl font-bold">0</h3>
    </div>

    <div class="bg-gray-100 p-4 rounded text-center">
      <p class="text-gray-500 text-sm">Average ATS Score</p>
      <h3 id="avgScore" class="text-2xl font-bold">0%</h3>
    </div>

    <div class="bg-gray-100 p-4 rounded text-center">
      <p class="text-gray-500 text-sm">Last Analyzed</p>
      <h3 id="lastDate" class="text-sm font-semibold">--</h3>
    </div>
  </div>

  <h3 class="text-xl font-bold mb-3">
    Resume History (<span id="reportCount">0</span>)
  </h3>

  <div id="resumeList" class="space-y-3"></div>

</div>
</main>

<script>
/* ===== MENU ===== */
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("hidden");
}

/* ===== ELEMENTS ===== */
const nameInput = document.getElementById("nameInput");
const totalResumes = document.getElementById("totalResumes");
const avgScore = document.getElementById("avgScore");
const lastDate = document.getElementById("lastDate");
const resumeList = document.getElementById("resumeList");
const reportCount = document.getElementById("reportCount");

/* ===== LOAD PROFILE ===== */
function loadProfile() {
  const savedName = localStorage.getItem("profileName");
  if (savedName) nameInput.value = savedName;

  const resumes = JSON.parse(localStorage.getItem("advancedResumes_v2")) || [];
  const analyzed = resumes.filter(r => r.analyzed && typeof r.score === "number");

  totalResumes.innerText = analyzed.length;
  reportCount.innerText = analyzed.length;

  if (analyzed.length) {
    const scores = analyzed.map(r => r.score);
    avgScore.innerText =
      Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) + "%";

    lastDate.innerText = analyzed[analyzed.length - 1].analyzedDate || "--";
  }

  resumeList.innerHTML = analyzed.length
    ? analyzed.map(r => `
        <div class="p-4 bg-gray-100 rounded flex justify-between items-center">
          <div>
            <b>${r.name || "Resume"}</b>
            <div class="text-xs text-gray-500">${r.analyzedDate}</div>
          </div>
          <span class="font-bold text-indigo-600">${r.score}%</span>
        </div>
      `).join("")
    : "<p class='text-gray-500'>No analyzed reports found.</p>";
}

/* ===== SAVE NAME ===== */
document.getElementById("saveBtn").onclick = () => {
  localStorage.setItem("profileName", nameInput.value);
  alert("Profile saved successfully");
};

/* ===== INIT ===== */
window.onload = loadProfile;

 function logout() {
    localStorage.removeItem("loggedUser");
    alert("Logged out successfully");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
