<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>User Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- ================= NAVBAR ================= -->
<nav id="navbar" class="bg-white shadow border-b hidden">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-indigo-600">Resume Analyzer</h1>
    <div class="space-x-4">
      <a href="dashboard.html" class="text-gray-700 hover:text-indigo-600 font-medium">Dashboard</a>
      <a href="reports.html" class="text-gray-700 hover:text-indigo-600 font-medium">Past Reports</a>
      <button id="logoutBtn" class="text-red-600 font-medium">Logout</button>
    </div>
  </div>
</nav>

<main class="flex justify-center p-6">

<!-- ================= LOGIN ================= -->
<div id="loginBox" class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border hidden">
  <h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">Login</h2>
  <input id="loginEmail" placeholder="Email" class="w-full p-3 border rounded mb-3">
  <input id="loginPass" type="password" placeholder="Password" class="w-full p-3 border rounded mb-4">
  <button id="loginBtn" class="w-full bg-indigo-600 text-white p-3 rounded">Login</button>
</div>

<!-- ================= PROFILE ================= -->
<div id="profilePage" class="bg-white w-full max-w-4xl p-8 rounded-2xl shadow-xl border hidden">

  <h2 class="text-3xl font-bold text-indigo-600 mb-6">My Profile</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <input id="nameInput" class="p-3 border rounded">
    <input id="emailInput" disabled class="p-3 border rounded bg-gray-100">
  </div>

  <button id="saveBtn"
    class="mb-8 bg-indigo-600 text-white px-4 py-2 rounded-lg">
    Save Profile
  </button>

  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-gray-100 p-4 rounded text-center">
      <p class="text-gray-500 text-sm">Total Reports</p>
      <h3 id="totalResumes" class="text-2xl font-bold">0</h3>
    </div>
    <div class="bg-gray-100 p-4 rounded text-center">
      <p class="text-gray-500 text-sm">Average ATS Score</p>
      <h3 id="avgScore" class="text-2xl font-bold">0%</h3>
    </div>
    <div class="bg-gray-100 p-4 rounded text-center">
      <p class="text-gray-500 text-sm">Last Analyzed</p>
      <h3 id="lastDate" class="text-sm font-semibold">--</h3>
    </div>
  </div>

  <h3 class="text-xl font-bold mb-3">
    Resume History (<span id="reportCount">0</span>)
  </h3>

  <div id="resumeList" class="space-y-3"></div>
</div>

</main>

<script>
/* ===== ELEMENTS ===== */
const navbar = document.getElementById("navbar");
const loginBox = document.getElementById("loginBox");
const profilePage = document.getElementById("profilePage");

const nameInput = document.getElementById("nameInput");
const emailInput = document.getElementById("emailInput");
const totalResumes = document.getElementById("totalResumes");
const avgScore = document.getElementById("avgScore");
const lastDate = document.getElementById("lastDate");
const resumeList = document.getElementById("resumeList");
const reportCount = document.getElementById("reportCount");

/* ===== VIEW ===== */
function showLogin() {
  navbar.classList.add("hidden");
  loginBox.classList.remove("hidden");
  profilePage.classList.add("hidden");
}

function showProfile() {
  navbar.classList.remove("hidden");
  profilePage.classList.remove("hidden");
  loginBox.classList.add("hidden");
  loadProfile();
}

/* ===== LOAD PROFILE (UPDATED – LATEST FIX) ===== */
function loadProfile() {
  const user = JSON.parse(localStorage.getItem("loggedUser"));
  if (!user) return showLogin();

  nameInput.value = user.name;
  emailInput.value = user.email;

  const reports = JSON.parse(localStorage.getItem("resumeReports")) || [];
  const userReports = reports.filter(r => r.email === user.email);

  totalResumes.innerText = userReports.length;
  reportCount.innerText = userReports.length;

  if (!userReports.length) {
    avgScore.innerText = "0%";
    lastDate.innerText = "--";
    resumeList.innerHTML = "<p class='text-gray-500'>No reports found.</p>";
    return;
  }

  /* 🔥 FIX: SORT BY LATEST DATE */
  const sortedReports = userReports.map(r => ({
    ...r,
    _date: new Date(r.analyzedDate || r.date || r.uploaded || 0)
  })).sort((a, b) => b._date - a._date);

  /* ===== LATEST ===== */
  const latest = sortedReports[0];
  lastDate.innerText =
    latest.analyzedDate ||
    latest.date ||
    latest.uploaded ||
    "--";

  /* ===== AVG ATS ===== */
  const scores = sortedReports
    .map(r => r.score ?? r.atsScore)
    .filter(n => typeof n === "number");

  avgScore.innerText = scores.length
    ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) + "%"
    : "0%";

  /* ===== HISTORY ===== */
  resumeList.innerHTML = sortedReports.map(r => `
    <div class="p-4 bg-gray-100 rounded flex justify-between items-center">
      <div>
        <b>${r.name || r.filename || "Resume"}</b>
        <div class="text-xs text-gray-500">
          ${r.analyzedDate || r.date || r.uploaded || "--"}
        </div>
      </div>
      <span class="font-bold text-indigo-600">
        ${(r.score ?? r.atsScore) + "%"}
      </span>
    </div>
  `).join("");
}

/* ===== AUTH ===== */
loginBtn.onclick = () => {
  const user = JSON.parse(localStorage.getItem("loggedUser"));
  if (user && user.email === loginEmail.value && user.pass === loginPass.value) {
    showProfile();
  } else {
    alert("Invalid login");
  }
};

logoutBtn.onclick = () => {
  localStorage.removeItem("loggedUser");
  showLogin();
};

saveBtn.onclick = () => {
  const user = JSON.parse(localStorage.getItem("loggedUser"));
  user.name = nameInput.value;
  localStorage.setItem("loggedUser", JSON.stringify(user));
  alert("Profile updated");
};

/* ===== INIT ===== */
window.onload = () => {
  localStorage.getItem("loggedUser") ? showProfile() : showLogin();
};
</script>

</body>
</html>
